<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Be Heard - English Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        :root {
            --primary: #031383;
            --accent: #00f2ff;
            --bg: #020a3d;
            --tile-text: #ffffff;
            --neon-purple: #cc00ff;
        }

        [data-theme="spring"] { --primary: #2d6a4f; --accent: #ffb7c5; --bg: #f1f8e9; --tile-text: #1b4332; --tile-v: #95d5b2; }
        [data-theme="summer"] { --primary: #e67e22; --accent: #f1c40f; --bg: #fff5e6; --tile-text: #d35400; --tile-v: #f39c12; }
        [data-theme="autumn"] { --primary: #a04000; --accent: #edbb99; --bg: #fdf5e6; --tile-text: #5e2612; --tile-v: #dc7633; }
        [data-theme="winter"] { --primary: #21618c; --accent: #aed6f1; --bg: #ebf5fb; --tile-text: #1a5276; --tile-v: #5dade2; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            font-family: 'Quicksand', sans-serif; /* Cập nhật font chính */
            background-color: var(--bg);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- SETUP PAGE --- */
        #setup-page {
            position: fixed; inset: 0; z-index: 5000;
            background: radial-gradient(circle at 20% 30%, #051aab, #020a3d 80%);
            display: flex; align-items: center; justify-content: center;
        }
        .setup-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 4vh; border-radius: 4vh; border: 0.8vh solid var(--accent);
            width: 92%; height: 92%; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            color: white; box-shadow: 0 0 5vh rgba(0,242,255,0.3);
        }
        .setup-box h1 { font-size: 8vh; color: var(--neon-purple); text-shadow: 0 0 3vh var(--neon-purple); font-weight: 700; }
        
        .input-group { width: 100%; flex: 1; display: flex; flex-direction: column; margin: 2vh 0; }
        textarea {
            width: 100%; flex: 1; border-radius: 3vh; padding: 3vh;
            background: rgba(255,255,255,0.1); color: white; border: 3px solid var(--neon-purple);
            font-family: 'Quicksand', sans-serif; font-size: 3vh; line-height: 1.4; resize: none;
        }

        .player-selector { display: flex; gap: 3vw; justify-content: center; margin: 2vh 0; }
        .player-btn {
            width: 10vh; height: 10vh; border-radius: 50%; border: 4px solid #aaa;
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 5vh; transition: 0.3s;
        }
        .player-btn.active { border-color: var(--accent); background: var(--accent); color: var(--primary); transform: scale(1.2); }

        /* --- GAME PAGE --- */
        #game-page { display: none; height: 100vh; flex-direction: column; }

        .game-header {
            height: 18vh; background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column; justify-content: space-around;
            padding: 1vh; border-bottom: 4px solid var(--neon-purple);
        }
        .scoreboard { display: flex; justify-content: center; gap: 15px; }
        .score-card {
            padding: 1vh 3vw; border-radius: 2vh; background: #eee;
            border: 3px solid transparent; text-align: center; min-width: 15vw;
        }
        .score-card.active { border-color: var(--neon-purple); background: #fff; box-shadow: 0 0 15px rgba(204,0,255,0.4); }
        .score-card .pts { font-weight: bold; color: var(--neon-purple); font-size: 3vh; }

        .toolbar { display: flex; justify-content: center; align-items: center; gap: 2vw; }
        .btn { 
    border: none; 
    padding: 1vh 2vw; /* Giảm padding từ 1.5vh/3vw xuống 1vh/2vw */
    border-radius: 4vh; 
    cursor: pointer; 
    font-family: 'Quicksand', sans-serif; 
    font-weight: 700; 
    font-size: 1.8vh; /* Giảm kích thước chữ từ 2.2vh xuống 1.8vh */
    transition: 0.2s;
}
        .btn-accent { 
    background: var(--neon-purple); 
    color: white; 
    font-size: 2vh; /* Giảm từ 3vh xuống 2.2vh */
    padding: 1vh 2vw;
}
        #dice-result { font-size: 5vh; font-weight: 700; width: 6vh; height: 6vh; border-radius: 1.5vh; display: flex; align-items: center; justify-content: center; background: white; }

        /* --- BOARD GRID --- */
        .board-container { flex: 1; padding: 1.5vh; position: relative; display: flex; align-items: center; justify-content: center; }
        #board {
            display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(5, 1fr);
            gap: 8px; width: 100%; height: 100%; max-width: 1200px;
        }
        .tile {
            background: white; border-radius: 1.5vh; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 4vh; box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border-bottom: 5px solid rgba(0,0,0,0.1);
        }
        .tile-vocab { background: var(--tile-v, #b0c4de); color: var(--tile-text); }
        .tile-positive { background: #00d2d3; }
        .tile-negative { background: #ff6b6b; color: white; }
        .tile-start, .tile-finish { background: #feca57; font-weight: 700; font-size: 2.5vh; }
        .tile-num { position: absolute; top: 4px; left: 6px; font-size: 1.5vh; font-weight: 700; opacity: 0.4; }

        .token {
            position: absolute; width: 5.5vh; height: 5.5vh;
            border-radius: 50%; border: 4px solid white;
            z-index: 100; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; font-size: 3.5vh;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); pointer-events: none;
        }

        /* --- MODAL CHỮ TO RÕ, KHÔNG LỖI TIẾNG VIỆT --- */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-box {
            background: white; padding: 6vh; border-radius: 5vh; text-align: center;
            width: 85%; max-width: 800px; border: 1vh solid var(--primary);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        #modal-type { font-size: 3vh; color: #666; text-transform: uppercase; margin-bottom: 2vh; font-weight: 600; letter-spacing: 1px; }
        #modal-content { 
            font-size: 8vh; 
            margin: 4vh 0; 
            color: var(--primary); 
            font-weight: 700; 
            line-height: 1.2;
            word-wrap: break-word;
        }
        .ans-btns { display: flex; justify-content: center; gap: 5vw; }
        .ans-btns button { font-size: 10vh; border: none; background: none; cursor: pointer; transition: 0.2s; }
        .ans-btns button:hover { transform: scale(1.1); }

        @media (max-width: 768px) {
            #board { grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(9, 1fr); }
            .setup-box h1 { font-size: 5vh; }
            #modal-content { font-size: 6vh; }
        }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 11000; }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div id="setup-page">
        <div class="setup-box">
            <h1>ENGLISH ADVENTURE</h1>
            
            <div class="input-group">
                <p style="font-size: 3vh; margin-bottom: 1vh;">📝 Nhập hoặc dán danh sách từ vựng/ câu hỏi tại đây</p>
                <textarea id="vocabInput" placeholder="Ví dụ:
Chào buổi sáng
What's your favorite food?
Gia đình">Apple
Banana
Cat
Dragon
Elephant
Flower</textarea>
            </div>
            
            <div>
                <p style="font-size: 3vh; margin-bottom: 1vh;">👥 Choose Players:</p>
                <div class="player-selector" id="playerSelector">
                    <div class="player-btn active" data-player="1">1</div>
                    <div class="player-btn" data-player="2">2</div>
                    <div class="player-btn" data-player="3">3</div>
                    <div class="player-btn" data-player="4">4</div>
                </div>
            </div>

            <div style="display: flex; gap: 2vw;">
                <label class="btn btn-accent" style="background:#444">🎵 Background music <input type="file" id="bgmUpload" accept="audio/*" style="display:none"></label>
                <label class="btn btn-accent" style="background:#444">📄 File Word <input type="file" id="docxUpload" accept=".docx" style="display:none"></label>
            </div>

            <button class="btn btn-accent" style="width:100%; padding: 2.5vh" onclick="initGame()">LET'S START 🚀</button>
        </div>
    </div>

    <div id="game-page">
        <header class="game-header">
            <div id="scoreboard" class="scoreboard"></div>
            <div class="toolbar">
                <button class="btn btn-accent" onclick="rollDice()">🎲 Roll</button>
                <div id="dice-result">?</div>
                <button class="btn" id="muteBtn" onclick="toggleMute()" style="background:#ff4757; color:white">🔊 Music</button>
                <button class="btn" onclick="shuffleBoard()" style="background:#ddd">🔀 Shuffle</button>
                <select class="btn" onchange="changeTheme(this.value)" style="background:#ddd; font-family: inherit;">
                    <option value="default">Neon</option>
                    <option value="spring">Spring</option>
                    <option value="summer">Summer</option>
                    <option value="autumn">Fall</option>
                    <option value="winter">Winter</option>
                </select>
            </div>
        </header>

        <main class="board-container">
            <div id="board"></div>
        </main>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h2 id="modal-type"></h2>
            <div id="modal-content"></div>
            <div id="ans-section" class="ans-btns">
                <button onclick="handleAns(false)">❌</button>
                <button onclick="handleAns(true)">✅</button>
            </div>
            <div id="summary-section" style="display:none">
                <div id="rankings" style="font-size: 4vh; margin-bottom: 3vh;"></div>
                <button class="btn btn-accent" onclick="location.reload()">Play again</button>
            </div>
        </div>
    </div>

    <script>
        let players = [], currentPlayer = 0, vocabList = [], tilesData = [], isMoving = false, selectedPlayerCount = 1, isMuted = false;
        
        const bgm = new Audio();
        const sfx = {
            dice: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            move: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            correct: new Audio('https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3'),
            wrong: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            bonus: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            bomb: new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'),
            victory: new Audio('https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3')
        };
Object.values(sfx).forEach(s => { s.volume = 0.3; });

        function cleanInput(text) {
            return text.split('\n')
                .map(line => line.replace(/^(\d+[\.\)\-]\s*|[\-\*•⁃‣]\s*)/, '').trim())
                .filter(line => line.length > 0);
        }

        document.querySelectorAll('.player-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPlayerCount = parseInt(btn.dataset.player);
            };
        });

        document.getElementById('docxUpload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (le) => {
                mammoth.extractRawText({ arrayBuffer: le.target.result }).then(res => {
                    document.getElementById('vocabInput').value = cleanInput(res.value).join('\n');
                });
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('bgmUpload').onchange = (e) => {
            bgm.src = URL.createObjectURL(e.target.files[0]);
            bgm.loop = true;
            if(!isMuted) bgm.play();
        };

        function toggleMute() {
            isMuted = !isMuted;
            bgm.muted = isMuted;
            Object.values(sfx).forEach(s => s.muted = isMuted);
            document.getElementById('muteBtn').innerText = isMuted ? "🔇 Off" : "🔊 On";
            document.getElementById('muteBtn').style.background = isMuted ? "#777" : "#ff4757";
        }

        function initGame() {
            vocabList = cleanInput(document.getElementById('vocabInput').value);
            if(vocabList.length === 0) vocabList = ["Chưa có dữ liệu"];
            
            players = Array.from({length: selectedPlayerCount}, (_, i) => ({
                id: i, pos: 0, score: 0, icon: ['🐶', '🐱', '🤖', '🦄'][i], color: ['#FF4757', '#2ED573', '#1E90FF', '#FFA502'][i]
            }));

            document.getElementById('setup-page').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
            
            buildBoard();
            renderScoreboard();
            createTokens();
            if(bgm.src && !isMuted) bgm.play();
        }

        function buildBoard() {
            tilesData = [];
            for(let i=0; i<45; i++) {
                let type = 'vocab', content = vocabList[Math.floor(Math.random()*vocabList.length)], icon = '';
                if(i === 0) { type = 'start'; content = 'BẮT ĐẦU'; icon = '🏁'; }
                else if(i === 44) { type = 'finish'; content = 'VỀ ĐÍCH'; icon = '🏆'; }
                else if(i % 7 === 0) { type = 'positive'; content = '+2'; icon = '💎'; }
                else if(i % 11 === 0) { type = 'negative'; content = '-1'; icon = '💣'; }
                tilesData.push({ type, content, icon });
            }
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const cols = window.innerWidth <= 768 ? 5 : 9;
            
            tilesData.forEach((data, i) => {
                const row = Math.floor(i / cols);
                const isReversed = row % 2 !== 0;
                const col = isReversed ? (cols - 1 - (i % cols)) : (i % cols);

                const tile = document.createElement('div');
                tile.className = `tile tile-${data.type}`;
                tile.id = `tile-${i}`;
                tile.style.gridColumnStart = col + 1;
                tile.style.gridRowStart = row + 1;
                tile.innerHTML = `<span class="tile-num">${i}</span>${data.icon || ''}`;
                board.appendChild(tile);
            });
            setTimeout(updateTokenPositions, 100);
        }

        function createTokens() {
            players.forEach(p => {
                const t = document.createElement('div');
                t.id = `token-${p.id}`;
                t.className = 'token';
                t.style.backgroundColor = p.color;
                t.innerText = p.icon;
                document.querySelector('.board-container').appendChild(t);
            });
        }

        function updateTokenPositions() {
            players.forEach(p => {
                const tile = document.getElementById(`tile-${p.pos}`);
                const token = document.getElementById(`token-${p.id}`);
                if (tile && token) {
                    const rect = tile.getBoundingClientRect();
                    const containerRect = document.querySelector('.board-container').getBoundingClientRect();
                    const offset = p.id * 5; 
                    token.style.left = (rect.left - containerRect.left + rect.width/2 - 25 + offset) + 'px';
                    token.style.top = (rect.top - containerRect.top + rect.height/2 - 25 + offset) + 'px';
                }
            });
        }

        async function rollDice() {
            if(isMoving) return;
            isMoving = true;
            sfx.dice.play();
            const roll = Math.floor(Math.random()*6)+1;
            const res = document.getElementById('dice-result');
            
            for(let i=0; i<10; i++) {
                res.innerText = Math.floor(Math.random()*6)+1;
                await new Promise(r => setTimeout(r, 60));
            }
            res.innerText = roll;

            let p = players[currentPlayer];
            for(let i=0; i<roll; i++) {
                if(p.pos < 44) {
                    p.pos++;
                    updateTokenPositions();
                    sfx.move.currentTime = 0; sfx.move.play();
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            
            isMoving = false;
            showTileAction(p.pos);
        }

        function showTileAction(idx) {
            const data = tilesData[idx];
            const modal = document.getElementById('modal');
            const ansSection = document.getElementById('ans-section');
            modal.style.display = 'flex';
            document.getElementById('modal-type').innerText = data.type === 'vocab' ? "QUESTION" : "SURPRISE";
            document.getElementById('modal-content').innerText = data.type === 'vocab' ? `"${data.content}"` : (data.type === 'positive' ? "You got 2 points" : data.content);

            if(data.type === 'vocab') {
                ansSection.style.display = 'flex';
            } else {
                ansSection.style.display = 'none';
                if(data.type === 'positive') { sfx.bonus.play(); players[currentPlayer].score += 2; }
                if(data.type === 'negative') { sfx.bomb.play(); players[currentPlayer].score = Math.max(0, players[currentPlayer].score - 1); }
                renderScoreboard();
                if(data.type === 'finish') return endGame();
                setTimeout(closeModal, 1500);
            }
        }

        function handleAns(correct) {
            if(correct) {
                players[currentPlayer].score += 1;
                sfx.correct.play();
            } else {
                sfx.wrong.play();
            }
            renderScoreboard();
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            currentPlayer = (currentPlayer + 1) % players.length;
            renderScoreboard();
        }

        function renderScoreboard() {
            document.getElementById('scoreboard').innerHTML = players.map((p, i) => `
                <div class="score-card ${i === currentPlayer ? 'active' : ''}">
                    <div style="font-size:2vh">${p.icon} P${i+1}</div>
                    <div class="pts">${p.score}</div>
                </div>
            `).join('');
        }

        function shuffleBoard() {
            const mid = tilesData.slice(1, 44).sort(() => Math.random() - 0.5);
            tilesData = [tilesData[0], ...mid, tilesData[44]];
            renderBoard();
        }

        function changeTheme(t) { document.body.setAttribute('data-theme', t); }

        function endGame() {
            sfx.victory.play();
            startConfetti();
            document.getElementById('modal-type').innerText = "WELL DONE";
            document.getElementById('modal-content').innerText = "🏆 RANKING 🏆";
            document.getElementById('ans-section').style.display = 'none';
            document.getElementById('summary-section').style.display = 'block';
            const sorted = [...players].sort((a,b) => b.score - a.score);
            document.getElementById('rankings').innerHTML = sorted.map((p, idx) => `<p>${idx+1}. ${p.icon} Player ${p.id+1}: ${p.score} points</p>`).join('');
        }

        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let p = Array.from({length:100}, () => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                c: `hsl(${Math.random()*360}, 100%, 50%)`, r: Math.random()*10+5, v: Math.random()*3+2
            }));
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                p.forEach(part => {
                    ctx.fillStyle = part.c;
                    ctx.fillRect(part.x, part.y, part.r, part.r);
                    part.y += part.v;
                    if(part.y > canvas.height) part.y = -20;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        window.onresize = renderBoard;
    </script>
</body>
</html>
