<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Be Heard | Vocabulary in Use</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Righteous&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #031383;
            --primary-dark: #020c5e;
            --primary-light: #1a2fa8;
            --accent: #FFD93D;
            --accent-dark: #f0c200;
            --action: #FF6B6B;
            --action-dark: #e04f4f;
            --bg: #eef2ff;
            --card-bg: #ffffff;
            --success: #27ae60;
            --success-bg: #eafaf1;
            --danger: #e74c3c;
            --danger-bg: #fdf2f1;
            --text-muted: #7986b8;
            --border: #dae1f5;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 15% 25%, rgba(3,19,131,0.06) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(255,217,61,0.1) 0%, transparent 50%);
            min-height: 100vh;
            color: var(--primary);
            padding: 16px;
            touch-action: pan-y;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 2px 0 #b0baf0, 0 8px 40px rgba(3,19,131,0.10);
            border: 2px solid var(--border);
        }

        /* Clip the decorative header gradients without breaking sticky children */
        .app-header {
            overflow: hidden;
            border-radius: 26px 26px 0 0;
        }

        /* ── HEADER BANNER ── */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 60%, #2d49d6 100%);
            padding: 28px 30px 24px;
            position: relative;
        }
        .app-header::before {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(ellipse at 80% 50%, rgba(255,217,61,0.18) 0%, transparent 60%);
        }
        .app-header::after {
            content: '';
            position: absolute;
            bottom: -8px; left: 0; right: 0;
            height: 30px;
            background: var(--card-bg);
            border-radius: 28px 28px 0 0;
        }
        .app-header h1 {
            font-family: 'Righteous', sans-serif;
            font-size: 2.2rem;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .app-header h1 span {
            color: var(--accent);
        }
        .app-header .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.88rem;
            font-weight: 600;
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        /* ── INNER PADDING ── */
        .inner { padding: 28px 28px 32px; }

        /* ── SETUP VIEW ── */
        .section-label {
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
            margin-bottom: 18px;
        }
        #input-area {
            width: 100%;
            min-height: 175px;
            padding: 16px 18px;
            border-radius: 16px;
            border: 2.5px solid var(--border);
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
            background: #f8faff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.7;
        }
        #input-area:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(3,19,131,0.08);
            background: #fff;
        }
        .input-hint {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 600;
        }
        .input-hint span {
            background: var(--accent);
            color: var(--primary);
            border-radius: 4px;
            padding: 1px 6px;
            font-weight: 800;
            font-size: 0.78rem;
        }

        /* ── BUTTONS ── */
        .btn-row { display: flex; gap: 12px; flex-direction: column; }
        .btn {
            width: 100%; padding: 15px 20px;
            border: none; border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800; font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .btn:active { transform: translateY(3px); box-shadow: none !important; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 5px 0 var(--primary-dark), 0 8px 20px rgba(3,19,131,0.25);
        }
        .btn-secondary {
            background: #f0f2ff;
            color: var(--primary);
            border: 2px solid var(--border);
            box-shadow: 0 4px 0 #c8d0f0;
        }
        .btn-action {
            background: linear-gradient(135deg, var(--action) 0%, #ff8a65 100%);
            color: white;
            box-shadow: 0 5px 0 var(--action-dark), 0 8px 20px rgba(255,107,107,0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #2ecc71 100%);
            color: white;
            box-shadow: 0 5px 0 #1e8449, 0 8px 20px rgba(39,174,96,0.3);
        }
        .btn-pdf {
            background: linear-gradient(135deg, #e84393 0%, #c2185b 100%);
            color: white;
            box-shadow: 0 5px 0 #a01045, 0 8px 20px rgba(194,24,91,0.3);
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 4px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 2px; background: var(--border); border-radius: 2px;
        }
        .divider span { font-size: 0.78rem; color: var(--text-muted); font-weight: 700; letter-spacing: 2px; }

        /* ── WORD BANK (STICKY) ── */
        .word-bank-container {
            position: sticky; top: 0; z-index: 100;
            background: #fff;
            padding: 14px 20px 16px;
            border-bottom: 3px solid var(--border);
            box-shadow: 0 6px 20px rgba(3,19,131,0.08);
        }
        .bank-label {
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .bank-label::before {
            content: '';
            display: inline-block; width: 8px; height: 8px;
            background: var(--accent); border-radius: 50%;
        }
        .word-bank {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            max-height: 120px; overflow-y: auto;
        }
        .word-bank::-webkit-scrollbar { height: 4px; width: 4px; }
        .word-bank::-webkit-scrollbar-track { background: transparent; }
        .word-bank::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .draggable-word {
            background: #fff;
            padding: 3px 14px;
            border-radius: 99px;
            border: 2.5px solid var(--primary);
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--primary);
            cursor: grab;
            transition: all 0.15s;
            user-select: none;
            white-space: nowrap;
            box-shadow: 0 2px 0 rgba(3,19,131,0.15);
        }
        .draggable-word:hover {
            background: #eef2ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(3,19,131,0.15);
        }
        .draggable-word:active, .draggable-word.dragging {
            background: var(--accent);
            color: var(--primary);
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            cursor: grabbing;
        }
        .draggable-word.used {
            opacity: 0.2;
            pointer-events: none;
        }

        /* ── EXERCISE INNER ── */
        .exercise-inner { padding: 24px 24px 28px; }
        .exercise-progress {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }
        .progress-bar-track {
            flex: 1; height: 8px;
            background: var(--border); border-radius: 99px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), #4f6af5);
            border-radius: 99px; transition: width 0.4s ease;
        }
        .progress-label { font-size: 0.82rem; font-weight: 800; color: var(--text-muted); white-space: nowrap; }

        /* ── SENTENCE CARDS ── */
        .sentence-card {
            background: #f8faff;
            padding: 18px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
            display: flex; gap: 14px; align-items: flex-start;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.85;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .sentence-card:hover { border-color: #b0baf0; box-shadow: 0 4px 16px rgba(3,19,131,0.06); }
        .sentence-card.correct { background: var(--success-bg); border-color: #a9dfbf; border-left: 5px solid var(--success); }
        .sentence-card.wrong   { background: var(--danger-bg);  border-color: #f1aeb5; border-left: 5px solid var(--danger); }

        .q-number {
            background: var(--accent);
            color: var(--primary);
            min-width: 30px; height: 30px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.9rem;
            flex-shrink: 0; margin-top: 4px;
            box-shadow: 0 2px 0 var(--accent-dark);
        }

        /* ── DROP ZONES ── */
        .drop-zone {
            display: inline-flex; justify-content: center; align-items: center;
            min-width: 100px; height: 36px;
            border: 2px dashed rgba(3,19,131,0.3);
            border-radius: 8px;
            margin: 0 4px;
            padding: 0 10px;
            background: rgba(3,19,131,0.04);
            color: var(--action);
            font-size: 0.9rem;
            font-weight: 800;
            transition: all 0.15s;
            cursor: pointer;
            vertical-align: middle;
            position: relative;
        }
        .drop-zone:empty::after {
            content: '· · ·';
            color: #b0baf0;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
        }
        .drop-zone.hovered {
            background: #fff9e0;
            border-color: var(--accent-dark);
            border-style: solid;
            transform: scale(1.04);
        }
        .drop-zone:not(:empty) {
            background: rgba(3,19,131,0.07);
            border-style: solid;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── RESULT FEEDBACK WORDS ── */
        .res-word-correct { color: var(--success); font-weight: 900; }
        .res-word-wrong { color: var(--danger); text-decoration: line-through; opacity: 0.65; margin-right: 3px; }
        .res-word-fixed { color: var(--success); font-weight: 900; border-bottom: 2px solid var(--success); padding-bottom: 1px; }

        /* ── SCORE BANNER ── */
        .score-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 60%, #2d49d6 100%);
            color: white;
            padding: 32px 24px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .score-banner::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 80% 20%, rgba(255,217,61,0.2) 0%, transparent 60%);
        }
        .score-banner .score-circle {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.12);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 auto 16px;
            position: relative;
        }
        .score-banner .score-pct {
            font-family: 'Righteous', sans-serif;
            font-size: 2.4rem;
            color: var(--accent);
            line-height: 1;
        }
        .score-banner .score-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            font-weight: 700;
        }
        .score-banner .score-count {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            position: relative;
        }
        .score-banner .score-msg {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            position: relative;
        }

        /* ── RESULT AREA ── */
        .result-inner { padding: 24px 24px 32px; }

        /* ── RESULT ACTIONS ── */
        .result-actions { display: flex; gap: 12px; flex-direction: column; margin-top: 24px; }

        /* ── HIDDEN ── */
        .hidden { display: none !important; }

        /* ── ANIMATIONS ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .sentence-card { animation: fadeInUp 0.3s ease both; }
        .sentence-card:nth-child(1)  { animation-delay: 0.02s; }
        .sentence-card:nth-child(2)  { animation-delay: 0.05s; }
        .sentence-card:nth-child(3)  { animation-delay: 0.08s; }
        .sentence-card:nth-child(4)  { animation-delay: 0.11s; }
        .sentence-card:nth-child(5)  { animation-delay: 0.14s; }
        .sentence-card:nth-child(6)  { animation-delay: 0.17s; }
        .sentence-card:nth-child(7)  { animation-delay: 0.20s; }
        .sentence-card:nth-child(8)  { animation-delay: 0.23s; }
        .sentence-card:nth-child(9)  { animation-delay: 0.26s; }
        .sentence-card:nth-child(10) { animation-delay: 0.29s; }

        /* ── MOBILE ── */
        @media (max-width: 600px) {
            body { padding: 8px; }
            .inner, .exercise-inner, .result-inner { padding: 16px 16px 24px; }
            .app-header { padding: 22px 20px 22px; }
            .app-header h1 { font-size: 1.7rem; }
            .sentence-card { font-size: 1rem; padding: 14px 14px; }
            .word-bank-container { padding: 10px 14px 12px; }
        }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--primary); color: #fff;
            padding: 12px 24px; border-radius: 99px;
            font-weight: 700; font-size: 0.9rem;
            box-shadow: 0 8px 30px rgba(3,19,131,0.35);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 9999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="container">

    <!-- ── HEADER ── -->
    <div class="app-header">
        <h1>✍️ Vocabulary <span>In Use</span></h1>
        <p class="subtitle">Be Heard · Fill in the Gaps</p>
    </div>

    <!-- ══ SETUP VIEW ══ -->
    <div id="setup-view" class="inner">
        <p class="section-label">📋 Paste your text or upload a Word file</p>
        <div class="input-wrapper">
            <div id="input-area" contenteditable="true" 
                 placeholder="Paste sentences here. Bold (Ctrl+B) the target words you want to test..."></div>
        </div>
        <p class="input-hint">Tip: <span>Ctrl+B</span> to bold the vocabulary words you want tested as gaps.</p>

        <div class="btn-row" style="margin-top:18px;">
            <button class="btn btn-primary" onclick="startExercise()">
                🚀 Start Exercise (15 Questions)
            </button>
            <div class="divider"><span>or</span></div>
            <input type="file" id="file-upload" accept=".docx" style="display:none">
            <button class="btn btn-secondary" onclick="document.getElementById('file-upload').click()">
                📁 Upload Word Document (.docx)
            </button>
        </div>
    </div>

    <!-- ══ EXERCISE VIEW ══ -->
    <div id="exercise-view" class="hidden">
        <div class="word-bank-container">
            <div class="bank-label">Word Bank</div>
            <div class="word-bank" id="bank-content"></div>
        </div>
        <div class="exercise-inner">
            <div class="exercise-progress">
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
                </div>
                <div class="progress-label" id="progress-label">0 / 0 filled</div>
            </div>
            <div id="questions-list"></div>
            <div class="btn-row" style="margin-top:24px;">
                <button class="btn btn-pdf" onclick="downloadPDF()">
                    📥 Download PDF Worksheet
                </button>
                <button class="btn btn-action" onclick="submitExercise()">
                    🏆 Check Answers
                </button>
            </div>
        </div>
    </div>

    <!-- ══ RESULT VIEW ══ -->
    <div id="result-view" class="hidden">
        <div class="result-inner">
            <div id="score-box" class="score-banner"></div>
            <div id="detailed-results"></div>
            <div class="result-actions">
                <button class="btn btn-pdf" onclick="downloadPDF()">
                    📥 Download PDF Worksheet
                </button>
                <button class="btn btn-primary" onclick="location.reload()">
                    🔄 New Exercise
                </button>
            </div>
        </div>
    </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
    // ── FALLBACK DATA ──
    const FALLBACK = [
        { text: "It is **vital** to maintain a healthy lifestyle.", trans: "Duy trì lối sống lành mạnh là rất quan trọng." },
        { text: "He was **honored** for his **outstanding** performance.", trans: "Anh ấy được vinh danh vì màn trình diễn xuất sắc." },
        { text: "We need to **analyze** the data carefully.", trans: "Chúng ta cần phân tích dữ liệu một cách cẩn thận." },
        { text: "She **achieved** her goals through **persistence**.", trans: "Cô ấy đạt được mục tiêu nhờ sự kiên trì." },
        { text: "The company is **expanding** its business globally.", trans: "Công ty đang mở rộng kinh doanh trên toàn cầu." },
        { text: "Please confirm your **attendance** by Friday.", trans: "Vui lòng xác nhận sự tham dự của bạn trước thứ Sáu." },
        { text: "The weather today is **perfect** for a picnic.", trans: "Thời tiết hôm nay thật hoàn hảo để đi dã ngoại." },
        { text: "He has a **reputation** for being **reliable**.", trans: "Anh ấy nổi tiếng là người đáng tin cậy." },
        { text: "They struggled to overcome the **obstacles**.", trans: "Họ đã đấu tranh để vượt qua những trở ngại." },
        { text: "I highly **recommend** this book to everyone.", trans: "Tôi rất đề cử cuốn sách này cho mọi người." },
        { text: "The **landscape** here is **breathtaking**.", trans: "Phong cảnh ở đây thật ngoạn mục." },
        { text: "We must focus on our **priorities**.", trans: "Chúng ta phải tập trung vào các ưu tiên của mình." },
        { text: "She is **fluent** in three different languages.", trans: "Cô ấy thông thạo ba ngôn ngữ khác nhau." },
        { text: "The **innovation** led to a **breakthrough**.", trans: "Sự đổi mới đã dẫn đến một bước đột phá." },
        { text: "Always **strive** for excellence in everything.", trans: "Luôn phấn đấu cho sự xuất sắc trong mọi việc." },
        { text: "The **comprehensive** report provides a detailed **assessment** of the situation.", trans: "Bản báo cáo toàn diện cung cấp sự đánh giá chi tiết về tình hình." },
        { text: "We must **implement** new strategies to **enhance** our productivity.", trans: "Chúng ta phải triển khai các chiến lược mới để nâng cao năng suất." },
        { text: "The government has **allocated** more funds to **infrastructure** development.", trans: "Chính phủ đã phân bổ thêm ngân sách cho phát triển cơ sở hạ tầng." },
        { text: "Environmental **sustainability** is a **fundamental** concern for the future.", trans: "Sự bền vững môi trường là mối quan tâm cơ bản cho tương lai." },
        { text: "His **eloquent** speech made a **profound** impact on the audience.", trans: "Bài phát biểu hùng hồn của anh ấy đã tạo ra tác động sâu sắc đến khán giả." },
        { text: "You need to **justify** your decision with **concrete** evidence.", trans: "Bạn cần biện minh cho quyết định của mình bằng bằng chứng cụ thể." },
        { text: "The project was **postponed** due to **unforeseen** circumstances.", trans: "Dự án bị trì hoãn do những tình huống không lường trước." },
        { text: "Artificial intelligence is **revolutionizing** the way we interact with technology.", trans: "Trí tuệ nhân tạo đang cách mạng hóa cách chúng ta tương tác với công nghệ." },
        { text: "There is a noticeable **discrepancy** between the two sets of figures.", trans: "Có sự khác biệt đáng kể giữa hai bộ số liệu." },
        { text: "She demonstrated exceptional **resilience** in the face of adversity.", trans: "Cô ấy đã thể hiện khả năng phục hồi phi thường khi đối mặt với nghịch cảnh." },
        { text: "The **prevalent** view among experts is that the economy will **fluctuate**.", trans: "Quan điểm phổ biến trong giới chuyên gia là nền kinh tế sẽ biến động." },
        { text: "Effective communication is **indispensable** for successful **collaboration**.", trans: "Giao tiếp hiệu quả là không thể thiếu để hợp tác thành công." },
        { text: "We need to evaluate the **feasibility** of the proposed plan.", trans: "Chúng ta cần đánh giá tính khả thi của kế hoạch đã đề xuất." },
        { text: "Technological **advancements** have **facilitated** global trade.", trans: "Những tiến bộ công nghệ đã tạo điều kiện thuận lợi cho thương mại toàn cầu." },
        { text: "It is **imperative** to **adhere** to the safety regulations.", trans: "Việc tuân thủ các quy định an toàn là cấp thiết." }
    ];

    let currentQuestions = [];
    let allAnswers = [];

    // ── FILE UPLOAD ──
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            mammoth.convertToHtml({ arrayBuffer: event.target.result })
                .then(result => {
                    document.getElementById('input-area').innerHTML = result.value;
                    showToast('✅ File loaded successfully!');
                });
        };
        reader.readAsArrayBuffer(this.files[0]);
    });

    function cleanSentence(text) {
        return text.replace(/^\s*(\d+[\.\)\-\:]|[•\-\*○●►✓■□▪▫→⇒])\s*/g, '').trim();
    }

    // ── START EXERCISE ──
    function startExercise() {
        const inputDiv = document.getElementById('input-area');
        let extracted = [];

        const tempContainer = document.createElement('div');
        tempContainer.innerHTML = inputDiv.innerHTML;
        const paragraphs = tempContainer.querySelectorAll('p, li, div');

        paragraphs.forEach(p => {
            const nodes = p.querySelectorAll('b, strong, u');
            if (nodes.length > 0) {
                let originalText = p.innerText.trim();
                let cleanedText = cleanSentence(originalText);
                let gaps = [];
                nodes.forEach(n => {
                    let word = n.innerText.trim().replace(/[.,!?;:]+$/g, "");
                    if (word) gaps.push(word);
                });
                if (gaps.length > 0) extracted.push({ text: cleanedText, gaps, trans: "Keep practicing!" });
            }
        });

        let finalPool = extracted.sort(() => 0.5 - Math.random()).slice(0, 15);

        if (finalPool.length < 15) {
            let needed = 15 - finalPool.length;
            let extras = FALLBACK.sort(() => 0.5 - Math.random()).slice(0, needed);
            extras.forEach(m => {
                finalPool.push({
                    text: m.text.replace(/\*\*/g, ''),
                    gaps: [...m.text.matchAll(/\*\*(.*?)\*\*/g)].map(x => x[1]),
                    trans: m.trans
                });
            });
        }

        currentQuestions = finalPool;
        allAnswers = [];
        currentQuestions.forEach(q => q.gaps.forEach(g => allAnswers.push(g)));

        renderExercise();
    }

    // ── RENDER EXERCISE ──
    function renderExercise() {
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('exercise-view').classList.remove('hidden');

        const bank = document.getElementById('bank-content');
        const list = document.getElementById('questions-list');
        bank.innerHTML = ''; list.innerHTML = '';

        [...allAnswers].sort(() => 0.5 - Math.random()).forEach((w, i) => {
            const div = document.createElement('div');
            div.className = 'draggable-word';
            div.innerText = w;
            div.draggable = true;
            div.id = `word-${i}`;
            div.addEventListener('dragstart', e => {
                e.dataTransfer.setData("text", e.target.innerText);
                e.target.classList.add('dragging');
            });
            div.addEventListener('dragend', e => e.target.classList.remove('dragging'));
            // Touch / tap to select
            div.addEventListener('click', () => handleWordClick(div));
            bank.appendChild(div);
        });

        currentQuestions.forEach((q, qIdx) => {
            const card = document.createElement('div');
            card.className = 'sentence-card';
            let html = q.text;
            q.gaps.forEach((gap, gIdx) => {
                const regex = new RegExp(`\\b${gap.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                html = html.replace(regex,
                    `<span class="drop-zone"
                        data-q="${qIdx}" data-g="${gIdx}"
                        ondrop="handleDrop(event)"
                        ondragover="event.preventDefault(); this.classList.add('hovered')"
                        ondragleave="this.classList.remove('hovered')"
                        onclick="handleZoneClick(this)"></span>`
                );
            });
            card.innerHTML = `<div class="q-number">${qIdx + 1}</div><div style="flex:1">${html}</div>`;
            list.appendChild(card);
        });

        updateProgress();
        window.scrollTo(0, 0);
    }

    // ── PROGRESS TRACKING ──
    function updateProgress() {
        const total = document.querySelectorAll('.drop-zone').length;
        const filled = [...document.querySelectorAll('.drop-zone')].filter(z => z.innerText.trim()).length;
        const pct = total ? Math.round((filled / total) * 100) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-label').textContent = `${filled} / ${total} filled`;
    }

    // ── TAP-TO-FILL (mobile) ──
    let selectedWordElement = null;
    function handleWordClick(wordEl) {
        if (wordEl.classList.contains('used')) return;
        if (selectedWordElement) selectedWordElement.classList.remove('selected');
        if (selectedWordElement === wordEl) { selectedWordElement = null; return; }
        selectedWordElement = wordEl;
        wordEl.style.background = 'var(--accent)';
        showToast('👆 Now tap a blank to fill it');
    }

    function handleZoneClick(zone) {
        if (selectedWordElement) {
            if (zone.innerText) toggleWordInBank(zone.innerText, false);
            zone.innerText = selectedWordElement.innerText;
            toggleWordInBank(selectedWordElement.innerText, true);
            selectedWordElement.style.background = '';
            selectedWordElement = null;
        } else if (zone.innerText) {
            toggleWordInBank(zone.innerText, false);
            zone.innerText = '';
        }
        updateProgress();
    }

    // ── DRAG & DROP ──
    function handleDrop(e) {
        e.preventDefault();
        e.target.classList.remove('hovered');
        const word = e.dataTransfer.getData("text");
        if (e.target.innerText) toggleWordInBank(e.target.innerText, false);
        e.target.innerText = word;
        toggleWordInBank(word, true);
        updateProgress();
    }

    function clearGap(el) {
        if (el.innerText) {
            toggleWordInBank(el.innerText, false);
            el.innerText = '';
            updateProgress();
        }
    }

    function toggleWordInBank(word, used) {
        const items = document.querySelectorAll('.draggable-word');
        for (let it of items) {
            if (it.innerText === word && it.classList.contains('used') === !used) {
                if (used) it.classList.add('used');
                else it.classList.remove('used');
                break;
            }
        }
    }

    // ── SUBMIT ──
    function submitExercise() {
        let correctCount = 0, totalCount = 0;
        const resDiv = document.getElementById('detailed-results');
        resDiv.innerHTML = '';

        currentQuestions.forEach((q, qIdx) => {
            let sentenceHtml = q.text;
            let isAllCorrect = true;

            q.gaps.forEach((gap, gIdx) => {
                totalCount++;
                const zone = document.querySelector(`[data-q="${qIdx}"][data-g="${gIdx}"]`);
                const userAns = zone ? zone.innerText.trim() : "";
                const isCorrect = userAns.toLowerCase() === gap.toLowerCase();
                let feedback = "";

                if (isCorrect) {
                    correctCount++;
                    feedback = `<span class="res-word-correct">${userAns}</span>`;
                } else {
                    isAllCorrect = false;
                    feedback = `<span class="res-word-wrong">${userAns || '...'}</span><span class="res-word-fixed">${gap}</span>`;
                }
                const regex = new RegExp(`\\b${gap.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                sentenceHtml = sentenceHtml.replace(regex, feedback);
            });

            const card = document.createElement('div');
            card.className = `sentence-card ${isAllCorrect ? 'correct' : 'wrong'}`;
            card.innerHTML = `
                <div class="q-number">${qIdx + 1}</div>
                <div style="flex:1">
                    ${sentenceHtml}
                    <div style="margin-top:6px; font-size:0.82rem; color:#888; font-weight:600; font-style:italic">${q.trans}</div>
                </div>`;
            resDiv.appendChild(card);
        });

        const percent = Math.round((correctCount / totalCount) * 100);
        let icon = "🔥", msg = "Keep trying — you'll get there!";
        if (percent === 100) { icon = "🏆"; msg = "PERFECT! You're a vocabulary master!"; }
        else if (percent >= 80) { icon = "🌟"; msg = "EXCELLENT! Really impressive work!"; }
        else if (percent >= 50) { icon = "👍"; msg = "GOOD JOB! Keep building on this!"; }

        document.getElementById('score-box').innerHTML = `
            <div class="score-circle">
                <div class="score-pct">${percent}%</div>
                <div class="score-label">score</div>
            </div>
            <div class="score-count">✅ ${correctCount} correct out of ${totalCount}</div>
            <div class="score-msg">${icon} ${msg}</div>`;

        document.getElementById('exercise-view').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    // ── TOAST ──
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ══════════════════════════════════════════
    // ── PDF DOWNLOAD — FILL IN THE GAPS WORKSHEET ──
    // ══════════════════════════════════════════
    function downloadPDF() {
        if (!currentQuestions.length) { showToast('⚠️ No exercise loaded yet!'); return; }
        if (typeof window.jspdf === 'undefined') { showToast('⏳ PDF library loading, please retry...'); return; }

        showToast('📥 Generating PDF...');

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        const pageW  = doc.internal.pageSize.getWidth();   // 210
        const pageH  = doc.internal.pageSize.getHeight();  // 297
        const margin = 18;
        const cW     = pageW - margin * 2;
        const PRIMARY   = [3, 19, 131];
        const ACCENT    = [255, 217, 61];
        const SUCCESS   = [39, 174, 96];
        const LIGHT_BG  = [238, 242, 255];
        const BORDER    = [218, 225, 245];

        // ── helper: add page number footer ──
        function addFooter(pageNum, totalPages) {
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 160);
            doc.setFont('helvetica', 'normal');
            doc.text(`Be Heard · Vocabulary in Use`, margin, pageH - 8);
            doc.text(`Page ${pageNum} of ${totalPages}`, pageW - margin, pageH - 8, { align: 'right' });
            doc.setDrawColor(...BORDER);
            doc.setLineWidth(0.3);
            doc.line(margin, pageH - 12, pageW - margin, pageH - 12);
        }

        // ── helper: safe text wrap ──
        function safeLines(text, maxW, fontSize) {
            doc.setFontSize(fontSize);
            return doc.splitTextToSize(text, maxW);
        }

        // ── HEADER BLOCK (page 1) ──
        // Blue top bar
        doc.setFillColor(...PRIMARY);
        doc.rect(0, 0, pageW, 38, 'F');
        // Accent stripe
        doc.setFillColor(...ACCENT);
        doc.rect(0, 38, pageW, 4, 'F');

        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(22);
        doc.text('Fill in the Gaps', pageW / 2, 16, { align: 'center' });
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(200, 210, 255);
        doc.text('Vocabulary in Use  ·  Be Heard', pageW / 2, 26, { align: 'center' });
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        const today = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
        doc.text(today, pageW / 2, 34, { align: 'center' });

        let y = 52;

        // ── STUDENT INFO ROW ──
        doc.setFillColor(...LIGHT_BG);
        doc.roundedRect(margin, y, cW, 16, 3, 3, 'F');
        doc.setDrawColor(...BORDER);
        doc.setLineWidth(0.5);
        doc.roundedRect(margin, y, cW, 16, 3, 3, 'S');

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(...PRIMARY);
        doc.text('Name:', margin + 5, y + 7);
        doc.setDrawColor(160, 170, 210);
        doc.setLineWidth(0.4);
        doc.line(margin + 19, y + 7.5, margin + 90, y + 7.5);

        doc.text('Class:', margin + 100, y + 7);
        doc.line(margin + 114, y + 7.5, cW + margin - 30, y + 7.5);

        doc.text('Score:', cW + margin - 25, y + 7);
        doc.line(cW + margin - 10, y + 7.5, cW + margin, y + 7.5);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(130, 140, 170);
        doc.text('      Instructions: Use the words from the Word Bank to fill in the blanks. Each word may be used only once.', margin, y + 13.5);

        y += 24;

        // ── WORD BANK BOX ──
        const bankWords = [...new Set(allAnswers)].sort();
        const bankCols  = 4;
        const bankCellW = cW / bankCols;
        const bankRows  = Math.ceil(bankWords.length / bankCols);
        const bankH     = 12 + bankRows * 8 + 6;

        doc.setFillColor(...PRIMARY);
        doc.roundedRect(margin, y, cW, 10, 2, 2, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.text('WORD BANK', margin + 5, y + 7);

        y += 10;
        doc.setFillColor(248, 250, 255);
        doc.roundedRect(margin, y, cW, bankH - 10, 2, 2, 'F');
        doc.setDrawColor(...BORDER);
        doc.setLineWidth(0.5);
        doc.roundedRect(margin, y, cW, bankH - 10, 2, 2, 'S');

        y += 6;
        bankWords.forEach((word, i) => {
            const col = i % bankCols;
            const row = Math.floor(i / bankCols);
            const cx  = margin + col * bankCellW + 5;
            const cy  = y + row * 8;

            // Word chip background
            doc.setFillColor(255, 255, 255);
            doc.setDrawColor(...BORDER);
            doc.setLineWidth(0.4);
            const chipW = bankCellW - 8;
            doc.roundedRect(cx - 2, cy - 5, chipW, 7, 1.5, 1.5, 'FD');

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(9);
            doc.setTextColor(...PRIMARY);
            doc.text(word, cx + chipW / 2 - 2, cy, { align: 'center' });
        });

        y += bankRows * 8 + 4;

        // ── QUESTIONS ──
        y += 6;
        doc.setFillColor(...PRIMARY);
        doc.roundedRect(margin, y, cW, 10, 2, 2, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.text('FILL IN THE BLANKS', margin + 5, y + 7);
        y += 14;

        let pageCount = 1;

        currentQuestions.forEach((q, idx) => {
            // Replace gap words with blank lines
            let sentenceText = q.text;
            q.gaps.forEach(gap => {
                const underline = '_'.repeat(Math.max(gap.length + 4, 10));
                const regex = new RegExp(`\\b${gap.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                sentenceText = sentenceText.replace(regex, `  ${underline}  `);
            });

            const numStr   = `${idx + 1}.`;
            const textBody = sentenceText;
            const lines    = safeLines(textBody, cW - 16, 11);
            const lineH    = 6.5;
            const boxH     = Math.max(lines.length * lineH + 10, 16);

            // Page break check
            if (y + boxH > pageH - 20) {
                addFooter(pageCount, 2);
                doc.addPage();
                pageCount++;
                y = 20;
            }

            // Alternating row shading
            if (idx % 2 === 0) {
                doc.setFillColor(248, 250, 255);
                doc.roundedRect(margin, y - 1, cW, boxH, 2, 2, 'F');
            }

            // Number badge
            doc.setFillColor(...ACCENT);
            doc.roundedRect(margin, y + 1, 8, 8, 1.5, 1.5, 'F');
            doc.setTextColor(...PRIMARY);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(8);
            doc.text(String(idx + 1), margin + 4, y + 6.5, { align: 'center' });

            // Sentence text
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(11);
            doc.setTextColor(30, 30, 50);
            lines.forEach((line, li) => {
                doc.text(line, margin + 12, y + 6.5 + li * lineH);
            });

            // Thin divider line
            doc.setDrawColor(...BORDER);
            doc.setLineWidth(0.25);
            doc.line(margin, y + boxH + 1, margin + cW, y + boxH + 1);

            y += boxH + 4;
        });

        // ── ANSWER KEY (Page 2) ──
        addFooter(pageCount, pageCount + 1);
        doc.addPage();
        pageCount++;

        // Header
        doc.setFillColor(...PRIMARY);
        doc.rect(0, 0, pageW, 28, 'F');
        doc.setFillColor(...ACCENT);
        doc.rect(0, 28, pageW, 3, 'F');

        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.text('Answer Key', pageW / 2, 12, { align: 'center' });
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(200, 210, 255);
        doc.text('For Teacher Use Only', pageW / 2, 22, { align: 'center' });

        y = 40;

        // Answers in a 2-column layout
        const ansCols  = 2;
        const ansCellW = cW / ansCols;

        currentQuestions.forEach((q, idx) => {
            const col = idx % ansCols;
            const row = Math.floor(idx / ansCols);
            const ax  = margin + col * ansCellW;
            const ay  = y + row * 10;

            if (ay + 10 > pageH - 20) { /* simple overflow guard */ return; }

            // Number
            doc.setFillColor(...ACCENT);
            doc.roundedRect(ax, ay - 1, 7, 7, 1.5, 1.5, 'F');
            doc.setTextColor(...PRIMARY);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(8);
            doc.text(String(idx + 1), ax + 3.5, ay + 4.5, { align: 'center' });

            // Answer words
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(10);
            doc.setTextColor(...SUCCESS);
            doc.text(q.gaps.join('  /  '), ax + 10, ay + 5);

            // Sentence snippet (light)
            const snippet = q.text.replace(/\s+/g,' ').slice(0, 50) + (q.text.length > 50 ? '…' : '');
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(7.5);
            doc.setTextColor(150, 155, 175);
            doc.text(snippet, ax + 10, ay + 9);
        });

        addFooter(pageCount, pageCount);

        doc.save('vocabulary-fill-in-gaps.pdf');
        showToast('✅ PDF downloaded!');
    }
</script>
</body>
</html>
