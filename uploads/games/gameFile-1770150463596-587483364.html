<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Be Heard - Tic tac toe</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #031383;
            --secondary: #00d2ff;
            --accent: #ff007a;
            --bg: linear-gradient(135deg, #031383 0%, #0b1d51 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }
/* Season Themes */
        body.spring { --primary: #2d6a4f; --secondary: #95d5b2; --accent: #ff8fa3; --bg: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%); }
        body.summer { --primary: #e67e22; --secondary: #f1c40f; --accent: #e74c3c; --bg: linear-gradient(135deg, #ffedbc 0%, #ff6e7f 100%); }
        body.autumn { --primary: #6d4c41; --secondary: #d4a373; --accent: #e67e22; --bg: linear-gradient(135deg, #feb47b 0%, #ff7e5f 100%); }
        body.winter { --primary: #2c3e50; --secondary: #3498db; --accent: #12128C; --bg: linear-gradient(135deg, #70e1f5 0%, #ffd194 100%); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            background: var(--bg); background-attachment: fixed;
            overflow: hidden; color: var(--text-color); transition: 0.5s;
        }

        /* Layout */
        .page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; width: 100%; }
        .card { 
            background: var(--card-bg); border-radius: 30px; padding: 25px; 
            width: 100%; max-width: 600px; border: 5px solid var(--secondary);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); overflow-y: auto; max-height: 90vh;
        }

        /* Grid - Absolute Square Logic */
        .grid-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center; width: 100%;
        }
        .grid {
    display: grid;
    gap: 8px;
    /* Tăng các con số ở đây. Ví dụ: 80vw thành 95vw, 55vh thành 70vh */
    width: min(90vw, 70vh); 
    aspect-ratio: 1 / 1; 
}
        .cell {
            background: white; border-radius: 10px; border: 2px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; aspect-ratio: 1 / 1;
            overflow: hidden;
            box-shadow: 0 4px 0 #ccc; transition: 0.2s;
        }
        .cell:active { transform: translateY(2px); box-shadow: 0 1px 0 #ccc; }
        .cell-num { position: absolute; top: 3px; left: 5px; font-size: 0.8rem; color: #bbb; font-weight: bold; }
        .cell-symbol { font-size: 2.2rem; font-weight: 700; }

        /* Scoring & Buttons */
        .score-bar { display: flex; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 500px; }
        .score-item { flex: 1; padding: 10px; border-radius: 15px; text-align: center; background: white; border: 3px solid #eee; }
        .team-x { color: var(--accent); border-color: var(--accent); }
        .team-o { color: var(--primary); border-color: var(--primary); }

        .btn { 
            padding: 12px 20px; border-radius: 15px; border: none; font-family: inherit; 
            font-weight: 700; cursor: pointer; transition: 0.3s; 
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; font-size: 1.2rem; }
        .btn-shuffle { background: #6c5ce7; color: white; }
        .btn-mute { background: #dfe6e9; color: #2d3436; }

        /* Modal Auto-fit */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(3, 19, 131, 0.95);
            z-index: 1000; padding: 20px; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; width: 100%; max-width: 600px; border-radius: 40px;
            padding: 40px; text-align: center; border: 8px solid var(--secondary);
        }
        #word-box { 
            min-height: 200px; display: flex; align-items: center; justify-content: center;
            margin: 20px 0; overflow: hidden;
        }
        #word-text { font-weight: 700; color: var(--primary); line-height: 1.2; width: 100%; }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; 
            border: 2px solid #ddd; font-family: inherit;
        }

        .marked-X { background: #fff0f5 !important; color: var(--accent); }
        .marked-O { background: #eef2ff !important; color: var(--primary); }
    </style>
</head>
<body>

<div class="page" id="setup-screen">
    <div class="card">
        <h1 style="text-align:center; color: var(--primary); margin:0 0 20px 0;">Tic Tac Toe</h1>
        
        <label><b>1. Select Grid Size (Win 5):</b></label>
        <select id="grid-size">
            <option value="5">5 x 5</option>
            <option value="7">7 x 7</option>
            <option value="10">10 x 10</option>
        </select>

        <label><b>2. Upload background music (mp3):</b></label>
        <input type="file" id="bgm-upload" accept="audio/mp3">

        <label><b>3. Content (Paste or Upload .docx):</b></label>
        <input type="file" id="docx-upload" accept=".docx">
        <textarea id="vocab-input" rows="5" placeholder="Paste your questions here..."></textarea>
        
        <button class="btn btn-primary" onclick="initGame()">LET'S START 🚀</button>
    </div>
</div>

<div class="page" id="game-screen" style="display:none;">
    <div class="score-bar">
        <div class="score-item team-x">Team X: <b id="score-x">0</b></div>
        <div class="score-item team-o">Team O: <b id="score-o">0</b></div>
    </div>

    <div class="grid-wrapper">
        <div id="grid" class="grid"></div>
    </div>
<div class="toolbar">
    
    <div style="margin-top:20px; display:flex; gap:10px;">
<select id="theme-select" onchange="applyTheme(this.value)" style="width: auto; background: white; border: 1px solid #ddd;">
            <option value="default">🌌 Theme</option>
            <option value="spring">🌸 Spring</option>
            <option value="summer">☀️ Summer</option>
            <option value="autumn">🍂 Fall</option>
            <option value="winter">❄️ Winter</option>
        </select>
        <button class="btn btn-shuffle" onclick="shuffleRemaining()"><i class="fas fa-random"></i> Shuffle Questions</button>
        <button class="btn btn-mute" onclick="toggleMute()" id="mute-btn"><i class="fas fa-volume-up"></i></button>
        <button class="btn" style="background:#ff7675; color:white;" onclick="location.reload()">Reset</button>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <div style="font-size: 1rem; color: #999; text-transform: uppercase;">Question</div>
        <div id="word-box"><div id="word-text"></div></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <button class="btn" style="background:var(--accent); color:white;" onclick="claim('X')">Correct Team X</button>
            <button class="btn" style="background:var(--primary); color:white;" onclick="claim('O')">Correct Team O</button>
        </div>
        
        <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#aaa; cursor:pointer;">Cancel</button>
    </div>
</div>

<audio id="audio-bgm" loop></audio>

<script>
    let vocabulary = [];
    let boardState = [];
    let curSize = 5;
    let selectedIdx = -1;
    let scores = {X: 0, O: 0};
    
    const sndCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3');
    

    // Handle Docx Upload
    document.getElementById('docx-upload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            const result = await mammoth.extractRawText({arrayBuffer: event.target.result});
            document.getElementById('vocab-input').value = result.value;
        };
        reader.readAsArrayBuffer(this.files[0]);
    });

    // Handle BGM Upload
    document.getElementById('bgm-upload').addEventListener('change', function(e) {
        const file = this.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            const bgm = document.getElementById('audio-bgm');
            bgm.src = url;
            bgm.play();
        }
    });
function applyTheme(theme) {
        document.body.className = (theme === 'default') ? '' : theme;
    }
    function cleanText(text) {
        return text.split('\n')
            .map(line => line.replace(/^[0-9\W\s.•*-]+/, '').trim()) // Removes 1., •, -, etc.
            .filter(line => line.length > 0);
    }

    function initGame() {
        const raw = document.getElementById('vocab-input').value;
        vocabulary = cleanText(raw);
        if (vocabulary.length === 0) { alert("Please enter some vocabulary first!"); return; }

        curSize = parseInt(document.getElementById('grid-size').value);
        boardState = Array(curSize * curSize).fill(null);
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        
        // Fill vocabulary to match grid size if not enough
        while(vocabulary.length < curSize * curSize) {
            vocabulary.push(vocabulary[Math.floor(Math.random()*vocabulary.length)]);
        }
        
        vocabulary = vocabulary.sort(() => Math.random() - 0.5);
        renderGrid();
    }

    function renderGrid() {
        const container = document.getElementById('grid');
        container.style.gridTemplateColumns = `repeat(${curSize}, 1fr)`;
        container.innerHTML = '';
        
        for (let i = 0; i < curSize * curSize; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell' + (boardState[i] ? ` marked-${boardState[i]}` : '');
            cell.innerHTML = `
                <span class="cell-num">${i + 1}</span>
                <span class="cell-symbol">${boardState[i] || ''}</span>
            `;
            cell.onclick = () => openQuestion(i);
            container.appendChild(cell);
        }
    }

    function openQuestion(idx) {
        if (boardState[idx]) return;
        selectedIdx = idx;
        const text = vocabulary[idx];
        const display = document.getElementById('word-text');
        display.innerText = text;
        
        document.getElementById('modal').style.display = 'flex';
        
        // Auto-font sizing
        let size = 80;
        display.style.fontSize = size + 'px';
        while (display.scrollHeight > 200 && size > 18) {
            size -= 2;
            display.style.fontSize = size + 'px';
        }
    }

    function claim(team) {
        boardState[selectedIdx] = team;
        scores[team]++;
        document.getElementById('score-x').innerText = scores.X;
        document.getElementById('score-o').innerText = scores.O;
        sndCorrect.play();
        closeModal();
        renderGrid();
        checkWin(team);
    }

   
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function shuffleRemaining() {
        let indices = [];
        boardState.forEach((val, i) => { if(!val) indices.push(i); });
        
        let wordsToShuffle = indices.map(i => vocabulary[i]);
        wordsToShuffle.sort(() => Math.random() - 0.5);
        
        indices.forEach((originalIdx, i) => {
            vocabulary[originalIdx] = wordsToShuffle[i];
        });
        alert("Remaining questions have been shuffled! 🎲");
    }

    function toggleMute() {
        const bgm = document.getElementById('audio-bgm');
        bgm.muted = !bgm.muted;
        document.getElementById('mute-btn').innerHTML = bgm.muted ? 
            '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    }

    function checkWin(team) {
        const s = curSize;
        const win = 5; // Fixed win condition 5 as requested

        const check = (arr) => {
            let count = 0;
            for(let idx of arr) {
                if(boardState[idx] === team) {
                    count++;
                    if(count === win) return true;
                } else { count = 0; }
            }
            return false;
        };

        // Rows and Cols
        for(let i=0; i<s; i++) {
            let row = [], col = [];
            for(let j=0; j<s; j++) {
                row.push(i*s + j);
                col.push(j*s + i);
            }
            if(check(row) || check(col)) return declareWinner(team);
        }

        // Diagonals (Generic for any size)
        for (let r = 0; r <= s - win; r++) {
            for (let c = 0; c <= s - win; c++) {
                let d1 = [], d2 = [];
                for (let k = 0; k < win; k++) {
                    d1.push((r + k) * s + (c + k));
                    d2.push((r + k) * s + (c + win - 1 - k));
                }
                if (check(d1) || check(d2)) return declareWinner(team);
            }
        }
    }

    function declareWinner(team) {
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        setTimeout(() => alert("🏆 TEAM " + team + " WINS!"), 500);
    }
</script>
</body>
</html>
